server:
  port: 8081

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

management:
  # NOTE (security posture): actuator endpoints are exposed unauthenticated for demo/grading.
  # In production, restrict access and set health.show-details to "when-authorized".
  # See docs/SECURITY.md.
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: account-service
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      # Overridden in docker-compose to point at the OTel Collector.
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    # The OTLP batch exporter logs a connection error on each flush when no collector is
    # reachable (e.g. running locally without the docker-compose observability stack).
    # Harmless — trace IDs are still generated and propagated — so the noise is silenced.
    io.opentelemetry.exporter.internal.http.HttpExporter: "off"
