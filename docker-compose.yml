services:
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: account-service
    # NOTE: the Account Service is "internal" — only the Gateway should call it. The host
    # port is published here purely so it can be exercised directly during the demo. In a
    # real deployment, drop this `ports` block: the Gateway reaches it over the compose
    # network, and nothing external can. See docs/SECURITY.md.
    ports:
      - "8081:8081"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    depends_on:
      - otel-collector

  event-gateway:
    build:
      context: .
      dockerfile: event-gateway/Dockerfile
    container_name: event-gateway
    ports:
      - "8080:8080"
    environment:
      ACCOUNT_SERVICE_BASE_URL: http://account-service:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    depends_on:
      account-service:
        condition: service_healthy
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector:0.102.1
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4318" # OTLP HTTP
      - "4317:4317" # OTLP gRPC
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - event-gateway
      - account-service
